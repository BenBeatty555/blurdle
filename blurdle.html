
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;600;800&display=swap');
  
  :root { /* global scope */
    --game-bg-color: #b7b7b7; 
    --letter-box-color: #777777;
  }
    
  .gameBoxBg {
    box-sizing: border-box;
    background: #933b3b;
    width: 150px;
    height: 200px;
    position: center;
    box-shadow: 2px 2px 4px 0px rgba(0, 0, 0, 0.25);
  }
  .line-two,
  .line-two * {
    box-sizing: border-box;
  }
  .line-two {
    width: 147px;
    height: 26px;
    position: relative;
  }
  .welcome-to-blurrdle,
  .welcome-to-blurrdle * {
    box-sizing: border-box;
  }
  .welcome-to-blurrdle {
    color: #000000;
    text-align: center;
    font-family: "Inter-SemiBold", sans-serif;
    font-size: 20px;
    font-weight: 600;
    position: relative;
    width: 216px;
    height: 48px;
  }

  .blurdle-wrap {
    font-family: 'DM Sans', sans-serif;
    padding: 1.5rem 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
    background: var(--game-bg-color);
  }

  .blurdle-header {
    text-align: center;
  }

  .blurdle-title {
    font-family: 'Space Mono', monospace;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--color-text-primary);
    margin: 0 0 4px;
  }

  .blurdle-subtitle {
    font-size: 13px;
    color: var(--color-text-secondary);
    margin: 0;
  }

  .blurdle-board {
    display: grid;
    grid-template-rows: repeat(6, 1fr);
    gap: 6px;
  }

  .blurdle-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
  }

  .blurdle-tile {
    width: 58px;
    height: 58px;
    border: 2px solid var(--color-border-secondary);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    color: var(--color-text-primary);
    text-transform: uppercase;
    transition: border-color 0.1s;
    position: relative;
    overflow: hidden;
    background: var(--letter-box-color);
  }

  .blurdle-tile.filled {
    border-color: var(--color-border-primary);
    animation: pop 0.1s ease;
  }

  .blurdle-tile.correct {
    background: #538D4E;
    color: #fff;
    border-color: #538D4E;
  }

  .blurdle-tile.present {
    background: #B59F3B;
    color: #fff;
    border-color: #B59F3B;
  }

  .blurdle-tile.absent {
    background: var(--letter-box-color);
    color: var(--color-text-secondary);
    border-color: transparent;
  }

  .blurdle-tile.reveal {
    animation: flip 0.5s ease forwards;
  }

  .blurdle-tile.shake {
    animation: shake 0.4s ease;
  }

  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.12); }
    100% { transform: scale(1); }
  }

  @keyframes flip {
    0% { transform: rotateX(0deg); }
    50% { transform: rotateX(-90deg); }
    100% { transform: rotateX(0deg); }
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%,60% { transform: translateX(-6px); }
    40%,80% { transform: translateX(6px); }
  }

  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    40% { transform: translateY(-12px); }
    60% { transform: translateY(-6px); }
  }

  .blurdle-tile.bounce { animation: bounce 0.6s ease; }

  .keyboard {
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: center;
  }

  .keyboard-row {
    display: flex;
    gap: 6px;
  }

  .key {
    height: 58px;
    min-width: 43px;
    padding: 0 8px;
    border: none;
    border-radius: 6px;
    background: var(--color-background-secondary);
    color: var(--color-text-primary);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    text-transform: uppercase;
    transition: background 0.15s, color 0.15s;
    border: 0.5px solid var(--color-border-tertiary);
  }

  .key.wide { min-width: 66px; font-size: 12px; }
  .key:hover { background: var(--color-border-tertiary); }
  .key.correct { background: #538D4E; color: #fff; border-color: #538D4E; }
  .key.present { background: #B59F3B; color: #fff; border-color: #B59F3B; }
  .key.absent { background: var(--color-border-primary); color: var(--color-text-tertiary); border-color: transparent; }

  .message-bar {
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 600;
    color: var(--color-text-primary);
    letter-spacing: 0.02em;
  }

  .new-game-btn {
    padding: 10px 28px;
    border-radius: 6px;
    border: none;
    background: var(--color-text-primary);
    color: var(--color-background-primary);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    transition: opacity 0.15s;
  }
  .new-game-btn:hover { opacity: 0.8; }
</style>

  const KEYBOARD_ROWS = [

  ['Enter','z','x','c','v','b','n','m','⌫']
];

let secret, grid, currentRow, currentCol, gameOver, keyColors;

function init() {
  secret = WORDS[Math.floor(Math.random() * WORDS.length)];
  grid = Array.from({length: 6}, () => Array(5).fill(''));
  currentRow = 0; currentCol = 0; gameOver = false;
  keyColors = {};
  document.getElementById('msg').textContent = '';
  renderBoard();
  renderKeyboard();
}

function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  for (let r = 0; r < 6; r++) {
    const row = document.createElement('div');
    row.className = 'blurdle-row';
    row.id = 'row-' + r;
    for (let c = 0; c < 5; c++) {
      const tile = document.createElement('div');
      tile.className = 'blurdle-tile';
      tile.id = `tile-${r}-${c}`;
      tile.textContent = grid[r][c];
      if (grid[r][c]) tile.classList.add('filled');
      row.appendChild(tile);
    }
    board.appendChild(row);
  }
}

function renderKeyboard() {
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  KEYBOARD_ROWS.forEach(keys => {
    const row = document.createElement('div');
    row.className = 'keyboard-row';
    keys.forEach(k => {
      const btn = document.createElement('button');
      btn.className = 'key' + (k.length > 1 ? ' wide' : '');
      btn.textContent = k;
      btn.dataset.key = k;
      if (keyColors[k.toLowerCase()]) btn.classList.add(keyColors[k.toLowerCase()]);
      btn.addEventListener('click', () => handleKey(k));
      row.appendChild(btn);
    });
    kb.appendChild(row);
  });
}

function updateTile(r, c, letter) {
  const tile = document.getElementById(`tile-${r}-${c}`);
  tile.textContent = letter.toUpperCase();
  tile.classList.toggle('filled', !!letter);
}

function handleKey(key) {
  if (gameOver) return;
  if (key === '⌫' || key === 'Backspace') {
    
    if (currentCol > 0) {
      console.log('Backspacing ' + grid[currentRow][currentCol-1]);
      currentCol--;
      grid[currentRow][currentCol] = '';
      updateTile(currentRow, currentCol, '');
    }
    return;
  }
  if (key === 'Enter') {
    submitGuess();
    return;
  }
  if (/^[a-zA-Z]$/.test(key) && currentCol < 5) {
    grid[currentRow][currentCol] = key.toLowerCase();
    updateTile(currentRow, currentCol, key);
    currentCol++;
  }
}

function isValidWord(word) {
  return (WORDS.includes(word)) || (allWordMap.get(word[0]).includes(word));
}

function submitGuess() {
  if (currentCol < 5) {
    shakeRow(currentRow);
    showMsg('Not enough letters');
    return;
  }
  let guess = grid[currentRow].join('').toUpperCase();

  if(!isValidWord(guess)){
    shakeRow(currentRow);
    showMsg('Not a valid English word');
    return;
  }
  // check valid word here

  let result = scoreGuess(guess);
  if (result.every(r => r === 'correct')) {
    gameOver = true;
    const msgs = ['Genius!','Magnificent!','Impressive!','Splendid!','Great!','Phew!'];
    showMsg(msgs[currentRow] || 'Nice!');
    bounceRow(currentRow);
  } else {
    flipRow(currentRow, () => { })
    currentRow++;
    currentCol = 0;
    if (currentRow >= 6) {
      gameOver = true;
      showMsg(secret.toUpperCase());
    }
  }
  if(gameOver){
    for(let i = 0; i < 6 && i <= currentRow; i++){
      guess = grid[i].join('').toUpperCase();
      result = scoreGuess(guess);
      revealRow(i, result, guess , () => { });
    }
    showNewGame();
  }

}

function scoreGuess(guess) {
  const result = Array(5).fill('absent');
  const secretArr = secret.split('');
  const guessArr = guess.split('');
  const used = Array(5).fill(false);
  for (let i = 0; i < 5; i++) {
    if (guessArr[i] === secretArr[i]) { result[i] = 'correct'; used[i] = true; }
  }
  for (let i = 0; i < 5; i++) {
    if (result[i] === 'correct') continue;
    for (let j = 0; j < 5; j++) {
      if (!used[j] && guessArr[i] === secretArr[j]) { result[i] = 'present'; used[j] = true; break; }
    }
  }
  return result;
}

function revealRow(r, result, guess, cb) {
  const PRIORITY = { correct: 3, present: 2, absent: 1 };
  result.forEach((state, c) => {
    const tile = document.getElementById(`tile-${r}-${c}`);
    setTimeout(() => {
      tile.classList.add('reveal');
      setTimeout(() => {
        tile.classList.add(state);
        const letter = guess[c];
        const cur = keyColors[letter];
        if (!cur || PRIORITY[state] > PRIORITY[cur]) keyColors[letter] = state;
        const keyBtn = document.querySelector(`[data-key="${letter}"]`);
        if (keyBtn) {
          keyBtn.className = 'key';
          keyBtn.classList.add(keyColors[letter]);
        }
      }, 250);
    }, c * 120);
  });
  setTimeout(cb, 5 * 120 + 400);
}
function flipRow(r, cb) {
  ['','','','',''].forEach((state, c) => {
    const tile = document.getElementById(`tile-${r}-${c}`);
    setTimeout(() => {
      tile.classList.add('reveal');
      setTimeout(() => {  }, 250);
    }, c * 120);
  });
  setTimeout(cb, 5 * 120 + 400);
}

function shakeRow(r) {
  const row = document.getElementById('row-' + r);
  row.querySelectorAll('.blurdle-tile').forEach(t => {
    t.classList.remove('shake');
    void t.offsetWidth;
    t.classList.add('shake');
  });
}

function bounceRow(r) {
  const row = document.getElementById('row-' + r);
  row.querySelectorAll('.blurdle-tile').forEach((t, i) => {
    setTimeout(() => { t.classList.add('bounce'); }, i * 80);
  });
}

function showMsg(text) {
  const el = document.getElementById('msg');
  el.textContent = text;
  if (!gameOver) setTimeout(() => { if (el.textContent === text) el.textContent = ''; }, 1500);
}

function showNewGame() {
  setTimeout(() => {
    const kb = document.getElementById('keyboard');
    const btn = document.createElement('button');
    btn.className = 'new-game-btn';
    btn.textContent = 'New Game';
    btn.onclick = init;
    kb.after(btn);
  }, 1600);
}

document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  if (e.key === 'Enter') handleKey('Enter');
  else if (e.key === 'Backspace') handleKey('Backspace');
  else if (/^[a-zA-Z]$/.test(e.key)) handleKey(e.key);
});

init();
